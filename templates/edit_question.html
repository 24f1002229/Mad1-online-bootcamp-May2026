{% extends "Admin_dashboard.html" %}
{% block content %}

<h1 style="text-align: center;"> Edit Question form </h1>
<form action="/edit_question/{{question.id}}/{{email}}" method="POST">
  <div class="mb-3">
    <label for="number" class="form-label">Question Id</label>
    <input type="number" class="form-control" id="number" name="id" value="{{question.id}}">
  </div>
  <div class="mb-3">
    <label for="text" class="form-label">Question title</label>
    <input type="text" class="form-control" id="text" name="title" value="{{question.title}}">
  </div>
  <div class="mb-3">
    <label for="text" class="form-label">Question Statement </label>
    <input type="text" class="form-control" id="text" name="question_statement" value="{{question.question_statement}}">
  </div>
  <h3> Options: </h3>
  <div class="mb-3">
    <label for="text" class="form-label">Option1</label>
    <input type="text" class="form-control" id="text" name="option1" value="{{question.option1}}">
  </div>
  <div class="mb-3">
    <label for="text" class="form-label">Option2</label>
    <input type="text" class="form-control" id="number" name="option2" value="{{question.option2}}">
  </div>
  <div class="mb-3">
    <label for="text" class="form-label">Option3</label>
    <input type="text" class="form-control" id="text" name="option3" value="{{question.option3}}">
  </div>
  <div class="mb-3">
    <label for="text" class="form-label">Option4</label>
    <input type="text" class="form-control" id="text" name="option4" value="{{question.option4}}">
  </div>
  <div>
    <label for="correct_option" class="form-label"> Correct Option</label>
    <select class="form-select" id="correct_option" name="correct_option" value="{{question.correct_option}}" required>
        <option value="option1">Option1</option>
        <option value="option2">Option2</option>
        <option value="option3">Option3</option>
        <option value="option4">option4</option>
    </select>
  </div>
  
  <button type="submit" class="btn btn-primary">Submit</button>
</form>

{% endblock %}
